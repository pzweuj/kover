global_options:
  freezed:
    runs_before:
      - json_serializable
  drift_dev:
    runs_before:
      - riverpod_generator

targets:
  $default:
    sources:
      - lib/**
      - swaggers/**
    builders:
      drift_dev:
        options:
          databases:
            app_database: lib/database/app_database.dart
      swagger_dart_code_generator:
        options:
          input_folder: swaggers/
          input_urls:
            - url: "https://raw.githubusercontent.com/Kareadita/Kavita/refs/tags/v0.9.0/openapi.json"
          output_folder: "lib/api"
          exclude_paths:
            - "api/Person/roles"
