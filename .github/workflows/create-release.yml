name: Create Release

on:
  workflow_dispatch:

jobs:
  version:
    uses: ./.github/workflows/get-version.yml

  create-tag:
    name: Create Git Tag
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ needs.version.outputs.version }} -m "Release v${{ needs.version.outputs.version }}"
          git push origin ${{ needs.version.outputs.version }}

  create-release:
    name: Create GitHub Release
    needs:
      - version
      - create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true

  build-and-deploy-apk:
    name: Build & Deploy apk
    needs:
      - version
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: "write"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get FVM Configuration
        uses: kuhnroyal/flutter-fvm-config-action@v3
        id: fvm-config-action

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release -dname "CN=Release" \
            -storepass android -keypass android

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify codegen
        run: |
          echo "Checking for generated files..."
          ls -la lib/riverpod/providers/network_switch.g.dart 2>/dev/null || echo "network_switch.g.dart NOT FOUND"
          ls -la lib/riverpod/providers/client.g.dart 2>/dev/null || echo "client.g.dart NOT FOUND"
          cat lib/riverpod/providers/network_switch.g.dart 2>/dev/null || echo "Cannot read network_switch.g.dart"

      - name: Build
        run: |
          flutter build apk --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}
        env:
          KEYSTORE_PATH: "release-keystore.jks"
          KEYSTORE_PASSWORD: "android"
          KEY_ALIAS: "release"
          KEY_PASSWORD: "android"

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NAME="Kover-${{ needs.version.outputs.version }}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "$RELEASE_NAME"
          gh release upload ${{ needs.version.outputs.version }} "$RELEASE_NAME"
