name: Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/**/*"
  workflow_dispatch:

jobs:
  version:
    uses: ./.github/workflows/get-version.yml

  build-web:
    name: Build Web
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get FVM Configuration
        uses: kuhnroyal/flutter-fvm-config-action@v3
        id: fvm-config-action

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Fetch web dependencies
        run: dart run tools/fetch_web_dependencies.dart

      - name: Codegen
        run: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: |
          flutter build web \
            --release \
            --base-href /kover/ \
            --build-name ${{ needs.version.outputs.version }} \
            --build-number ${{ needs.version.outputs.build_number }} \
            --wasm

      - name: Upload Debug Symbols to Sentry
        env:
          SENTRY_RELEASE: ${{ vars.SENTRY_PROJECT }}@${{ needs.version.outputs.version }}+${{ needs.version.outputs.build_number }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          dart run sentry_dart_plugin

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy-web:
    name: Deploy Web
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
