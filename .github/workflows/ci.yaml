name: CI
on:
  push:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: apk --debug
          - os: ubuntu-latest
            platform: web
          - os: ubuntu-latest
            platform: linux
          - os: macos-26
            platform: ios --no-codesign
          - os: macos-26
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Get FVM Configuration 🔧
        uses: kuhnroyal/flutter-fvm-config-action@v3
        id: fvm-config-action

      - name: Setup Flutter 📦
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Linux Dependencies 🐧
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev

      - name: Fetch web dependencies 🌐
        if: matrix.platform == 'web'
        run: dart run tools/fetch_web_dependencies.dart

      - name: Disable MacOS Code Signing
        if: matrix.platform == 'macos'
        run: cd macos && fastlane disable_codesign

      - name: Code Generation 🧬
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Validate DB Schema 🗄️
        if: matrix.platform != 'windows'
        run: |
          dart run drift_dev make-migrations
          git diff --exit-code -- lib test drift_schemas

      - name: Check Format 🎨
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze 🔍
        run: flutter analyze

      - name: Build 🏗️
        run: flutter build ${{ matrix.platform }}

      - name: Test 🧪
        run: flutter test
